<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Register — Obsidian</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/auth.css"/></head>
<body>
<div class="auth-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="grid"></div></div>
<div class="auth-wrapper" style="max-width:500px;">
<a href="index.html" class="back-link">← Back to Home</a>
<div class="auth-card">
<a href="index.html" class="auth-logo"><div class="auth-logo-icon">◆</div>Obsidian</a>
<h1 class="auth-heading">Create your account</h1>
<p class="auth-subtext">Already have an account? <a href="login.html">Log in →</a></p>

<div id="alertBox" class="alert alert-error" style="display:none;"><span id="alertIcon">⚠️</span><span id="alertMsg">Something went wrong.</span></div>

<div class="oauth-row">
  <a id="githubBtn" href="#" class="btn-oauth btn-github">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
    Continue with GitHub
  </a>
</div>

<div class="auth-divider">or register with email OTP</div>

<form class="auth-form" id="registerForm" novalidate>

  <!-- Step 1: Name + Email -->
  <div id="regStep1" class="auth-step">
    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <div class="input-wrap"><span class="input-icon">👤</span><input type="text" id="firstName" placeholder="Eshana" autocomplete="given-name"/></div>
        <span class="field-error" id="firstNameError"></span>
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <div class="input-wrap"><span class="input-icon">👤</span><input type="text" id="lastName" placeholder="Singh" autocomplete="family-name"/></div>
        <span class="field-error" id="lastNameError"></span>
      </div>
    </div>
    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrap"><span class="input-icon">✉️</span><input type="email" id="email" placeholder="you@example.com" autocomplete="email"/></div>
      <span class="field-error" id="emailError"></span>
    </div>
    <label class="form-check">
      <input type="checkbox" id="terms"/>
      <span class="checkbox-custom"></span>
      I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
    </label>
    <span class="field-error" id="termsError"></span>
    <button type="button" class="btn-submit" id="regSendOtpBtn">
      <span class="btn-text">Send Verification Code →</span>
      <span class="spinner"></span>
    </button>
  </div>

  <!-- Step 2: OTP verification -->
  <div id="regStep2" class="auth-step" style="display:none;">
    <p class="otp-hint">Code sent to <strong id="regOtpEmail"></strong></p>
    <div class="form-group">
      <label>6-Digit Verification Code</label>
      <div class="otp-input-group" id="regOtpGroup">
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      </div>
      <span class="field-error" id="regOtpError"></span>
    </div>
    <div class="resend-row">
      <span id="regResendTimerText" class="resend-timer"></span>
      <button type="button" class="btn-resend" id="regResendBtn" disabled>Resend OTP</button>
    </div>
    <button type="submit" class="btn-submit" id="regVerifyBtn">
      <span class="btn-text">Verify &amp; Create Account →</span>
      <span class="spinner"></span>
    </button>
    <button type="button" class="btn-back" id="regBackBtn">← Change email</button>
  </div>

</form>
</div></div>
<script src="config.js"></script>
<script src="js/startup.js"></script>
<script src="js/auth.js"></script>
<script>initAuthPage('register');</script>
</body></html>
