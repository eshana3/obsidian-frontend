<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Register — Obsidian</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/auth.css"/></head>
<body>
<div class="auth-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="grid"></div></div>
<div class="auth-wrapper" style="max-width:500px;">
<a href="index.html" class="back-link">← Back to Home</a>
<div class="auth-card">
<a href="index.html" class="auth-logo"><div class="auth-logo-icon">◆</div>Obsidian</a>
<h1 class="auth-heading">Create your account</h1>
<p class="auth-subtext">Already have an account? <a href="login.html">Log in →</a></p>
<div id="alertBox" class="alert alert-error" style="display:none;"><span id="alertIcon">⚠️</span><span id="alertMsg">Something went wrong.</span></div>
<div class="auth-divider">Register with email</div>
<form class="auth-form" id="registerForm" novalidate>
<div class="form-row">
<div class="form-group"><label for="firstName">First Name</label><div class="input-wrap"><span class="input-icon">👤</span><input type="text" id="firstName" placeholder="Eshana" autocomplete="given-name"/></div><span class="field-error" id="firstNameError"></span></div>
<div class="form-group"><label for="lastName">Last Name</label><div class="input-wrap"><span class="input-icon">👤</span><input type="text" id="lastName" placeholder="Singh" autocomplete="family-name"/></div><span class="field-error" id="lastNameError"></span></div>
</div>
<div class="form-group"><label for="email">Email Address</label><div class="input-wrap"><span class="input-icon">✉️</span><input type="email" id="email" placeholder="you@example.com" autocomplete="email"/></div><span class="field-error" id="emailError"></span></div>
<div class="form-group"><label for="password">Password</label><div class="input-wrap"><span class="input-icon">🔒</span><input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password"/><button type="button" class="pass-toggle" id="togglePass">👁️</button></div><div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div><div class="strength-label" id="strengthLabel"></div><span class="field-error" id="passwordError"></span></div>
<div class="form-group"><label for="confirmPassword">Confirm Password</label><div class="input-wrap"><span class="input-icon">🔒</span><input type="password" id="confirmPassword" placeholder="Repeat your password" autocomplete="new-password"/><button type="button" class="pass-toggle" id="toggleConfirmPass">👁️</button></div><span class="field-error" id="confirmPasswordError"></span></div>
<label class="form-check"><input type="checkbox" id="terms"/><span class="checkbox-custom"></span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
<span class="field-error" id="termsError"></span>
<button type="submit" class="btn-submit" id="registerBtn"><span class="btn-text">Create Account →</span><span class="spinner"></span></button>
</form>
</div></div>
<script src="config.js"></script>
<script src="js/startup.js"></script>
<script src="js/auth.js"></script>
<script>initAuthPage('register');</script>
</body></html>
