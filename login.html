<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Log In — Obsidian</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/auth.css"/></head>
<body>
<div class="auth-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="grid"></div></div>
<div class="auth-wrapper">
<a href="index.html" class="back-link">← Back to Home</a>
<div class="auth-card">
<a href="index.html" class="auth-logo"><div class="auth-logo-icon">◆</div>Obsidian</a>
<h1 class="auth-heading">Welcome back</h1>
<p class="auth-subtext">Don't have an account? <a href="register.html">Create one for free →</a></p>

<div id="alertBox" class="alert alert-error" style="display:none;"><span id="alertIcon">⚠️</span><span id="alertMsg">Something went wrong.</span></div>

<div id="wakeupBox" class="wakeup-box" style="display:none;">
  <div class="wakeup-header"><div class="wakeup-pulse"></div><span class="wakeup-title">Starting AI Research Engine…</span></div>
  <ul class="wakeup-steps">
    <li class="wakeup-step" id="step-local"><span class="step-icon" id="step-local-icon">⏳</span><span class="step-label">Checking local server</span><span class="step-detail" id="step-local-detail"></span></li>
    <li class="wakeup-step" id="step-spring"><span class="step-icon" id="step-spring-icon">—</span><span class="step-label">Connecting to backend</span><span class="step-detail" id="step-spring-detail"></span></li>
    <li class="wakeup-step" id="step-login"><span class="step-icon" id="step-login-icon">—</span><span class="step-label">Sending verification code</span><span class="step-detail" id="step-login-detail"></span></li>
  </ul>
  <div class="wakeup-track"><div class="wakeup-fill" id="wakeupFill"></div></div>
  <div class="wakeup-attempts" id="wakeupAttempts"></div>
</div>

<div class="oauth-row">
  <a id="githubBtn" href="https://obsidian-backend-n8zo.onrender.com/oauth2/authorization/github" class="btn-oauth btn-github">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
    Continue with GitHub
  </a>
</div>

<div class="auth-divider">or sign in with email OTP</div>

<form class="auth-form" id="loginForm" novalidate>

  <!-- Step 1: Email -->
  <div id="loginStep1" class="auth-step">
    <div class="form-group">
      <label for="email">Email Address</label>
      <div class="input-wrap">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <span class="field-error" id="emailError"></span>
    </div>
    <button type="button" class="btn-submit" id="sendOtpBtn">
      <span class="btn-text">Send OTP →</span>
      <span class="spinner"></span>
    </button>
  </div>

  <!-- Step 2: OTP verification -->
  <div id="loginStep2" class="auth-step" style="display:none;">
    <p class="otp-hint">Code sent to <strong id="otpEmailDisplay"></strong></p>
    <div class="form-group">
      <label>6-Digit Verification Code</label>
      <div class="otp-input-group" id="loginOtpGroup">
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-digit" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      </div>
      <span class="field-error" id="otpError"></span>
    </div>
    <div class="resend-row">
      <span id="resendTimerText" class="resend-timer"></span>
      <button type="button" class="btn-resend" id="resendOtpBtn" disabled>Resend OTP</button>
    </div>
    <label class="form-check">
      <input type="checkbox" id="rememberMe"/>
      <span class="checkbox-custom"></span>
      Keep me signed in for 30 days
    </label>
    <button type="submit" class="btn-submit" id="verifyOtpBtn">
      <span class="btn-text">Verify &amp; Sign In →</span>
      <span class="spinner"></span>
    </button>
    <button type="button" class="btn-back" id="backToEmailBtn">← Change email</button>
  </div>

</form>
</div></div>
<script src="config.js"></script>
<script src="js/startup.js"></script>
<script src="js/auth.js"></script>
<script>initAuthPage('login');</script>
</body></html>
