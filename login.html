<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Log In — Obsidian</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/auth.css"/></head>
<body>
<div class="auth-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="grid"></div></div>
<div class="auth-wrapper">
<a href="index.html" class="back-link">← Back to Home</a>
<div class="auth-card">
<a href="index.html" class="auth-logo"><div class="auth-logo-icon">◆</div>Obsidian</a>
<h1 class="auth-heading">Welcome back</h1>
<p class="auth-subtext">Don't have an account? <a href="register.html">Create one for free →</a></p>
<div id="alertBox" class="alert alert-error" style="display:none;"><span id="alertIcon">⚠️</span><span id="alertMsg">Something went wrong.</span></div>
<div id="wakeupBox" class="wakeup-box" style="display:none;">
  <div class="wakeup-header">
    <div class="wakeup-pulse"></div>
    <span class="wakeup-title">Starting AI Research Engine…</span>
  </div>
  <ul class="wakeup-steps">
    <li class="wakeup-step" id="step-local">
      <span class="step-icon" id="step-local-icon">⏳</span>
      <span class="step-label">Checking local server</span>
      <span class="step-detail" id="step-local-detail"></span>
    </li>
    <li class="wakeup-step" id="step-spring">
      <span class="step-icon" id="step-spring-icon">—</span>
      <span class="step-label">Connecting to backend</span>
      <span class="step-detail" id="step-spring-detail"></span>
    </li>
    <li class="wakeup-step" id="step-login">
      <span class="step-icon" id="step-login-icon">—</span>
      <span class="step-label">Signing you in</span>
      <span class="step-detail" id="step-login-detail"></span>
    </li>
  </ul>
  <div class="wakeup-track"><div class="wakeup-fill" id="wakeupFill"></div></div>
  <div class="wakeup-attempts" id="wakeupAttempts"></div>
</div>
<div class="oauth-row">
<button class="btn-oauth" onclick="handleGoogleLogin()" type="button"><svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Google</button>
<button class="btn-oauth" onclick="handleGithubLogin()" type="button"><svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.09-.745.083-.729.083-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/></svg>GitHub</button>
</div>
<div class="auth-divider">or continue with email</div>
<form class="auth-form" id="loginForm" novalidate>
<div class="form-group"><label for="email">Email Address</label><div class="input-wrap"><span class="input-icon">✉️</span><input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email"/></div><span class="field-error" id="emailError"></span></div>
<div class="form-group"><div class="forgot-row"><label for="password">Password</label><a href="#" class="forgot-link" onclick="handleForgotPassword(event)">Forgot password?</a></div><div class="input-wrap"><span class="input-icon">🔒</span><input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password"/><button type="button" class="pass-toggle" id="togglePass">👁️</button></div><span class="field-error" id="passwordError"></span></div>
<label class="form-check"><input type="checkbox" id="rememberMe"/><span class="checkbox-custom"></span>Keep me signed in for 30 days</label>
<button type="submit" class="btn-submit" id="loginBtn"><span class="btn-text">Log In →</span><span class="spinner"></span></button>
</form>
</div></div>
<script src="config.js"></script>
<script src="js/startup.js"></script>
<script src="js/auth.js"></script>
<script>initAuthPage('login');</script>
</body></html>
