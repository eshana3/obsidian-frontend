services:
  - type: web
    name: obsidian-research-assistant
    env: node
    plan: free
    region: oregon          # pick whatever region is closest to your users

    # Render runs these from the repo root
    buildCommand: npm run build        # installs chatbot-server/node_modules
    startCommand: npm start            # node chatbot-server/server.js

    # Health check — Render uses this to confirm the app is up
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      # Port is injected automatically by Render — don't hardcode it
      # The server already reads: parseInt(process.env.PORT, 10) || 3001

      # Spring Boot backend (auth proxy target)
      # Change this if your Spring Boot URL is different
      - key: SPRING_BASE_URL
        value: https://obsidian-backend-n8zo.onrender.com

      # ── AI Provider (pick ONE) ────────────────────────────────────────────────
      # Option A — Groq (recommended, FREE): get key at console.groq.com
      #   Provider is auto-selected when GROQ_API_KEY is set (takes priority over Ollama).
      - key: GROQ_API_KEY
        sync: false        # set this in the Render dashboard — do not commit your key
      - key: GROQ_MODEL
        value: llama3-8b-8192   # free models: llama3-8b-8192, llama3-70b-8192, mixtral-8x7b-32768

      # Option B — OpenAI (paid): set OPENAI_API_KEY in Render dashboard instead.
      # Option C — Ollama (local dev only, not available on Render free tier):
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: llama3.2
      - key: OLLAMA_EMBED_MODEL
        value: nomic-embed-text

      # Logging
      - key: LOG_LEVEL
        value: info

      # SQLite DB path — stored on Render's ephemeral disk.
      # Data is lost on each redeploy on the free tier.
      # Upgrade to a Render Disk or migrate to Turso/PlanetScale for persistence.
      - key: DB_PATH
        value: /tmp/obsidian.db
